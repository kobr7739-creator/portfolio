<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBR | Classified Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@500;800;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050203;
            --card-bg: rgba(18, 5, 8, 0.85);
            --accent-red: #ff0033;
            --accent-glow: rgba(255, 0, 51, 0.4);
            --text-primary: #e0e6ed;
            --text-dim: #a58c93;
            --border-color: rgba(255, 0, 51, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Tajawal', 'Chakra Petch', sans-serif;
            min-height: 200vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 35%, rgba(255, 0, 51, 0.12) 0%, transparent 60%),
                linear-gradient(to bottom, transparent 95%, rgba(255, 0, 51, 0.05) 100%);
            background-size: 100% 100%, 100% 4px;
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 51, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 51, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .status-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--accent-red);
            background: rgba(255, 0, 51, 0.08);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 50px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px var(--accent-glow);
            text-transform: uppercase;
            animation: pulse 2.5s infinite alternate;
        }

        .identity-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 10px;
            color: #ffffff;
            text-shadow: 
                0 0 20px var(--accent-glow),
                0 0 40px rgba(255, 0, 51, 0.3);
            margin-bottom: 10px;
            position: relative;
        }

        /* الجمجمة الواقعية المرسومة باللون الأحمر */
        .skull-container {
            width: 180px;
            height: 220px;
            margin: 5px 0 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: pulse-skull 3.5s infinite ease-in-out;
        }

        .skull-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--accent-red)) drop-shadow(0 0 40px var(--accent-glow));
        }

        .subtitle {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            max-width: 650px;
            line-height: 1.6;
            direction: ltr;
            text-transform: uppercase;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 2px;
            opacity: 0.7;
            animation: bounce 2s infinite;
        }

        .scroll-indicator .arrow {
            width: 12px;
            height: 12px;
            border-right: 2px solid var(--accent-red);
            border-bottom: 2px solid var(--accent-red);
            transform: rotate(45deg);
        }

        .contact-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 45px 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.95), 0 0 35px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
        }

        .section-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .section-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .section-header p {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .link-item:hover {
            background: rgba(255, 0, 51, 0.08);
            border-color: var(--accent-red);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .platform-name {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            display: block;
        }

        .handle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--accent-red);
            direction: ltr;
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: var(--accent-red);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-red);
        }

        @keyframes pulse {
            0% { opacity: 0.6; box-shadow: 0 0 5px var(--accent-glow); }
            100% { opacity: 1; box-shadow: 0 0 25px var(--accent-glow); }
        }

        @keyframes pulse-skull {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--accent-glow)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 35px var(--accent-red)); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }

        @media (max-width: 600px) {
            .identity-title { font-size: 3.5rem; letter-spacing: 6px; }
            .skull-container { width: 140px; height: 170px; }
            .subtitle { font-size: 1rem; }
            .contact-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>

        <h1 class="identity-title">KOBR</h1>

                    <path d="M 90 240 C 120 180 150 140 200 110" stroke-width="1.5" opacity="0.8"/>
                    <path d="M 410 240 C 380 180 350 140 300 110" stroke-width="1.5" opacity="0.8"/>
                </g>
            </svg>
        </div>

        <p class="subtitle">Never think we are in competition. All i see is me</p>

        <div class="scroll-indicator">
            <span>انزل للتواصل</span>
            <div class="arrow"></div>
        </div>
    </section>

            <div class="section-header">
                <h2>SECURE CHANNELS</h2>

            <div class="links-container">

</body>
</html>
