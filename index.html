<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBR | Classified Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@500;800;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(12, 17, 26, 0.75);
            --accent-green: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.25);
            --text-primary: #e0e6ed;
            --text-dim: #8c9ba5;
            --border-color: rgba(0, 255, 136, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Tajawal', 'Chakra Petch', sans-serif;
            min-height: 200vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 60%),
                linear-gradient(to bottom, transparent 95%, rgba(0, 255, 136, 0.03) 100%);
            background-size: 100% 100%, 100% 4px;
        }

        /* خلفية شبكية سيبرانية */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        /* Hero Section - الهوية الرئيسية */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .status-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--accent-green);
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 50px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px var(--accent-glow);
            text-transform: uppercase;
            animation: pulse 2.5s infinite alternate;
        }

        .identity-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 10px;
            color: #ffffff;
            text-shadow: 
                0 0 20px var(--accent-glow),
                0 0 40px rgba(0, 255, 136, 0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .subtitle {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            max-width: 650px;
            line-height: 1.6;
            direction: ltr;
            text-transform: uppercase;
        }

        /* مؤشر التمرير */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 2px;
            opacity: 0.7;
            animation: bounce 2s infinite;
        }

        .scroll-indicator .arrow {
            width: 12px;
            height: 12px;
            border-right: 2px solid var(--accent-green);
            border-bottom: 2px solid var(--accent-green);
            transform: rotate(45deg);
        }

        /* قسم وسائل التواصل الغامض */
        .contact-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 45px 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
        }

        .section-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .section-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .section-header p {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* أزرار الحسابات */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .link-item:hover {
            background: rgba(0, 255, 136, 0.05);
            border-color: var(--accent-green);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--accent-glow);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .platform-name {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            display: block;
        }

        .handle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--accent-green);
            direction: ltr;
        }

        .icon {
            width: 24px;
            height: 24px;
            fill: var(--accent-green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.6; box-shadow: 0 0 5px var(--accent-glow); }
            100% { opacity: 1; box-shadow: 0 0 20px var(--accent-glow); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }

        @media (max-width: 600px) {
            .identity-title { font-size: 3.5rem; letter-spacing: 6px; }
            .subtitle { font-size: 1rem; }
            .contact-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="cyber-grid"></div>

    <!-- القسم الأول: الواجهة الفخمة -->
    <section class="hero-section">
        <div class="status-badge">// SYSTEM ACCESS: GRANTED</div>
        <h1 class="identity-title">KOBR</h1>
        <p class="subtitle">Never think we are in competition. All i see is me</p>

        <div class="scroll-indicator">

        </div>
    </section>

</body>
</html>
